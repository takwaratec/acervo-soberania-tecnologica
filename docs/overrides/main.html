{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <style>
    .md-footer-meta {
      background-color: #050810;
    }
  </style>
{% endblock %}

{% block header %}
  {{ super() }}
{% endblock %}

{% block scripts %}
  {{ super() }}
  <script>
    var injectMQTFSubtitle = function() {
      var siteName = document.querySelector(".md-header__topic .md-ellipsis");
      if (siteName && !document.querySelector(".mqtf-subtitle")) {
        var subtitle = document.createElement("span");
        subtitle.className = "mqtf-subtitle";
        subtitle.innerText = "Tecnologia Takwara — Pesquisa Cidadã";
        siteName.appendChild(subtitle);
      }
    };

    // Suporte para navegação instantânea do Material
    document.addEventListener("DOMContentLoaded", injectMQTFSubtitle);
    if (typeof location$ !== "undefined") {
      location$.subscribe(function() {
        setTimeout(injectMQTFSubtitle, 100);
      });
    }
  </script>
{% endblock %}
