<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro — Acervo Soberania Tecnológica</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1d23; color: #e0e0e0; line-height: 1.6; padding: 2rem 1rem;
  }
  .container { max-width: 680px; margin: 0 auto; }
  h1 {
    font-size: 1.8rem; color: #b0bec5; margin-bottom: 0.5rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .subtitle {
    color: #78909c; font-size: 0.95rem; margin-bottom: 2rem; border-left: 3px solid #8bc34a;
    padding-left: 1rem;
  }
  .card {
    background: #23262e; border: 1px solid #2e323b; border-radius: 12px;
    padding: 1.5rem; margin-bottom: 1.5rem;
  }
  label { display: block; font-size: 0.9rem; color: #b0bec5; margin-bottom: 0.3rem; font-weight: 600; }
  .required::after { content: " *"; color: #ef5350; }
  input, textarea, select {
    width: 100%; padding: 0.75rem; border: 1px solid #383d47; border-radius: 8px;
    background: #1a1d23; color: #e0e0e0; font-size: 0.95rem; margin-bottom: 1.2rem;
    transition: border-color 0.2s;
  }
  input:focus, textarea:focus { outline: none; border-color: #8bc34a; }
  textarea { resize: vertical; min-height: 120px; font-family: inherit; }
  .checkbox-group {
    display: flex; align-items: flex-start; gap: 0.75rem; margin: 1rem 0;
    padding: 1rem; background: #1e2128; border-radius: 8px; border: 1px solid #2e323b;
  }
  .checkbox-group input[type="checkbox"] {
    width: 20px; height: 20px; margin: 3px 0 0 0; flex-shrink: 0;
    accent-color: #8bc34a;
  }
  .checkbox-group label { margin: 0; font-weight: 400; font-size: 0.88rem; color: #cfd8dc; }
  button {
    width: 100%; padding: 1rem; background: #8bc34a; color: #1a1d23;
    border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 700;
    cursor: pointer; transition: background 0.2s;
  }
  button:hover { background: #9ccc65; }
  .output-area {
    display: none; margin-top: 1.5rem; background: #1e2128; border: 1px solid #383d47;
    border-radius: 8px; padding: 1rem;
  }
  .output-area pre {
    background: #14161b; padding: 1rem; border-radius: 6px; overflow-x: auto;
    font-size: 0.85rem; color: #a5d6a7; white-space: pre-wrap; margin-top: 0.5rem;
  }
  .copy-btn {
    display: inline-block; padding: 0.5rem 1rem; background: #383d47;
    border: none; border-radius: 6px; color: #e0e0e0; font-size: 0.85rem;
    cursor: pointer; margin-top: 0.5rem;
  }
  .copy-btn:hover { background: #455a64; }
  .badge {
    display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px;
    font-size: 0.75rem; font-weight: 600; background: #37474f; color: #90a4ae;
    margin-bottom: 1rem;
  }
  .badge.cc { background: #1b5e20; color: #a5d6a7; }
  footer {
    margin-top: 3rem; text-align: center; font-size: 0.8rem; color: #546e7a;
  }
  .privacy-note {
    font-size: 0.8rem; color: #78909c; margin-top: 0.5rem;
  }
</style>
</head>
<body>
<div class="container">

  <h1>🪪 Cadastro no Acervo</h1>
  <div class="subtitle">
    Seu trabalho merece estar numa base de referência técnica.<br>
    Preencha os dados abaixo. A ficha gerada entra no Acervo Soberania Tecnológica
    sob licença <strong>CC BY 4.0</strong> — você mantém os direitos autorais.
  </div>

  <div class="card">
    <span class="badge cc">📋 Passo 1 — Seus dados</span>

    <label class="required">Nome completo / Nome social / Coletivo</label>
    <input type="text" id="nome" placeholder="Ex.: Maria do Socorro Silva / Associação de Artesãos do Juruá">

    <label class="required">Território de atuação</label>
    <input type="text" id="territorio" placeholder="Ex.: Reserva Extrativista do Juruá, AM | Vale do Ribeira, SP">

    <label>E-mail para contato</label>
    <input type="email" id="email" placeholder="opcional — usado só para validação do cadastro">

    <label>WhatsApp</label>
    <input type="text" id="whatsapp" placeholder="opcional — (DDD) 9xxxx-xxxx">

    <label class="required">Descreva seu trabalho</label>
    <textarea id="descricao" placeholder="Conte o que você faz, como faz, com quais materiais, onde atua, há quanto tempo. Pode incluir dados técnicos, processos, desafios. Ex.:&#10;&#10;Trabalho com manejo de bambu Guadua nativo no Acre há 12 anos. Faço a cura pelo método da dequada (imersão em água corrente por 30 dias) e uso as ripas para construir móveis, estruturas de telhado e cercas. Também produzo painéis de bambu laminado colado com adesivo vegetal à base de mamona. Já participei de 3 mutirões de habitação rural com o MST...">

    <label>Fotos ou documentos (opcional)</label>
    <input type="text" id="anexos" placeholder="Cole links de fotos, PDFs ou vídeos (Google Drive, Imgur, YouTube…)">

    <div class="checkbox-group">
      <input type="checkbox" id="consentimento">
      <label for="consentimento" class="required">
        Autorizo a inclusão deste resumo técnico para fins pedagógicos e de utilidade social
        não-comercial no Acervo Soberania Tecnológica, sob licença
        <strong>Creative Commons CC BY 4.0</strong> (atribuição obrigatória).
        Entendo que meu nome será creditado como autor do registro.
      </label>
    </div>
  </div>

  <button onclick="gerarCadastro()">📦 Gerar ficha para o acervo</button>

  <div class="output-area" id="outputArea">
    <span class="badge">✅ Pronto para processar</span>
    <p style="font-size:0.9rem;color:#b0bec5;">
      Copie o bloco abaixo e salve em <code style="background:#14161b;padding:0.1rem 0.4rem;border-radius:3px;">_pdfs_para_catalogar/</code>,
      ou cole direto no terminal com o comando sugerido.
    </p>
    <pre id="outputPre"></pre>
    <button class="copy-btn" onclick="copiarConteudo()">📋 Copiar</button>
    <p class="privacy-note" id="comandoTerminal" style="margin-top:0.8rem;"></p>
  </div>

  <footer>
    <a href="https://takwaratec.github.io/acervo-soberania-tecnologica/" style="color:#546e7a;">
      ← Voltar ao Acervo Soberania Tecnológica
    </a>
    <br><br>
    <span style="color:#37474f;">Os dados são processados localmente. Nada é enviado para servidores externos.</span>
  </footer>
</div>

<script>
function gerarCadastro() {
  const nome = document.getElementById('nome').value.trim();
  const territorio = document.getElementById('territorio').value.trim();
  const email = document.getElementById('email').value.trim();
  const whatsapp = document.getElementById('whatsapp').value.trim();
  const descricao = document.getElementById('descricao').value.trim();
  const anexos = document.getElementById('anexos').value.trim();
  const consentimento = document.getElementById('consentimento').checked;

  // Validação
  if (!nome) { alert('Por favor, preencha o nome.'); return; }
  if (!territorio) { alert('Por favor, preencha o território de atuação.'); return; }
  if (!descricao || descricao.length < 30) {
    alert('Descreva seu trabalho com pelo menos 30 caracteres para gerar uma ficha consistente.');
    return;
  }
  if (!consentimento) { alert('É necessário autorizar a licença CC BY 4.0 para cadastrar.'); return; }

  const data = new Date().toISOString().split('T')[0];
  const slug = nome.toLowerCase()
    .replace(/[áàâãä]/g, 'a').replace(/[éèêë]/g, 'e').replace(/[íìîï]/g, 'i')
    .replace(/[óòôõö]/g, 'o').replace(/[úùûü]/g, 'u').replace(/ç/g, 'c')
    .replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, '-').substring(0, 50);

  // Montar bloco de texto estruturado para o agente processar
  let bloco = `=== FORMULÁRIO DE INGESTÃO COMUNITÁRIA ===\n`;
  bloco += `data: ${data}\n`;
  bloco += `slug: ${slug}\n`;
  bloco += `nome: ${nome}\n`;
  bloco += `territorio: ${territorio}\n`;
  if (email) bloco += `email: ${email}\n`;
  if (whatsapp) bloco += `whatsapp: ${whatsapp}\n`;
  if (anexos) bloco += `anexos: ${anexos}\n`;
  bloco += `consentimento_cc_by_40: sim\n`;
  bloco += `=====================================\n\n`;
  bloco += descricao;

  const outputEl = document.getElementById('outputPre');
  outputEl.textContent = bloco;

  const outputArea = document.getElementById('outputArea');
  outputArea.style.display = 'block';

  // Comando para o terminal
  const cmd = `echo '${bloco.replace(/'/g, "'\\''")}' > _pdfs_para_catalogar/cadastro_${slug}.txt`;
  document.getElementById('comandoTerminal').innerHTML =
    `▶️ No terminal, execute:<br><code style="font-size:0.8rem;">cat > _pdfs_para_catalogar/cadastro_${slug}.txt << 'FIM'<br>${bloco.replace(/\n/g, '<br>')}<br>FIM</code>`;
}

function copiarConteudo() {
  const texto = document.getElementById('outputPre').textContent;
  navigator.clipboard.writeText(texto).then(() => {
    alert('✅ Copiado! Salve em _pdfs_para_catalogar/cadastro_nome.txt');
  }).catch(() => {
    // fallback
    const el = document.getElementById('outputPre');
    const range = document.createRange();
    range.selectNode(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    window.getSelection().removeAllRanges();
    alert('✅ Copiado!');
  });
}
</script>
</body>
</html>
