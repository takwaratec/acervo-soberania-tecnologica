site_name: Análises e Escrita Científica
site_description: Repositório de análises de artigos, teses e dissertações — Estado da arte, fichas técnicas e revisões bibliográficas
site_url: https://takwaratec.github.io/Analises-e-escrita-cientifica
repo_url: https://github.com/takwaratec/Analises-e-escrita-cientifica
repo_name: takwaratec/Analises-e-escrita-cientifica
edit_uri: edit/main/docs/
copyright: © Fabio Takwara, 2026. CC BY 4.0. Conteúdo das fichas e análises — uso livre mediante atribuição. Citações de terceiros mantêm seus direitos originais.

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Modo claro
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Modo escuro
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - footnotes
  - tables
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - Início: index.md
  - Sobre: sobre.md
  - Metodologia: metodologia.md
  - Análises:
    - analyses/index.md
    - Estado da Arte:
      - Visão Geral: analyses/estado-da-arte/index.md
      - Percepção Social em HIS: analyses/estado-da-arte/his-percepcao-social.md
      - Avaliação Pós-Ocupação: analyses/estado-da-arte/his-avaliacao-pos-ocupacao.md
      - Política Habitacional: analyses/estado-da-arte/his-politica-habitacional.md
      - Grandes Obras e Reassentamento na Amazônia: analyses/estado-da-arte/his-grandes-obras-reassentamento-amazonia.md
      - Bioeconomia Amazônica: analyses/estado-da-arte/bioeconomia-amazonica.md
      - Tecnologia Takwara: analyses/estado-da-arte/tecnologia-takwara.md
    - Fichas Técnicas:
      - analyses/fichas/index.md
      - Percepção Social:
        - Joyce Santos (2009): analyses/fichas/joyce-santos-2009.md
        - Menezes & Mourão (2017): analyses/fichas/menezes-mourao-2017-pmcmv-qv.md
        - Procópio & Campos (2022): analyses/fichas/procopio-campos-2022-ihas.md
        - Nascimento & Brasil (2023): analyses/fichas/nascimento-brasil-2023-pmcmv-bh.md
        - Oliveira & Villa (2024): analyses/fichas/oliveira-villa-2024-covid-his.md
      - APO:
        - Perim (2014): analyses/fichas/perim-2014-sustentabilidade-his.md
        - Thielke (2021): analyses/fichas/thielke-2021-apo-porto-alegre.md
        - Otoni & Villa (2024): analyses/fichas/otoni-villa-2024-resiliencia-ampliabilidade.md
      - Política Habitacional:
        - Lacerda (2023): analyses/fichas/lacerda-2023-padroes-espaciais.md
        - Ferreira (2023): analyses/fichas/ferreira-2023-avaliacao-desempenho-his.md
        - Simões & Leder (2024): analyses/fichas/simoes-leder-2024-assentamento-seriado.md
      - Grandes Obras:
        - Miranda Neto (2014): analyses/fichas/miranda-neto-2014-belo-monte-reassentamento.md
        - Belforte & Cavalcante (2021): analyses/fichas/belforte-cavalcante-2021-santo-antonio.md
        - Silva & Cavalcante (2022): analyses/fichas/silva-cavalcante-2022-reassentamento-rural-amazonia.md
    - Bioeconomia Amazônica:
      - analyses/fichas/sintese-cientifica-ecossistema-wtf.md
      - analyses/fichas/diag-bioeconomia-amazonica.md
      - analyses/fichas/diag-nova-economia-amazonia.md
      - analyses/fichas/diag-bndes-set-47-bioeconomia.md
      - analyses/fichas/bibliografia-mestra-mqtf.md
      - analyses/fichas/resenha-araújo-2025-acv-bambu.md
      - analyses/fichas/resenha-silva-mapeamento-bambu.md
    - Tecnologia Takwara:
      - analyses/fichas/memorial-5.1-biorrefinaria-bambu.md
      - analyses/fichas/resenha-naccache-imperveg.md
  - Prompts de Escrita: prompts/index.md
