site_name: Acervo Soberania Tecnológica
site_description: Curadoria documental de Fabio Takwara sobre materiais renováveis, construção, território e tecnologia social
site_url: https://takwaratec.github.io/acervo-soberania-tecnologica/
repo_url: https://github.com/takwaratec/acervo-soberania-tecnologica
repo_name: takwaratec/acervo-soberania-tecnologica
edit_uri: edit/main/docs/
copyright: "© Fabio Takwara, 2026. Textos curatoriais próprios sob a licença indicada em cada arquivo; conteúdos de terceiros preservam seus direitos."

theme:
  name: material
  custom_dir: overrides
  language: pt-BR
  palette:
    - scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Modo claro
    - scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Modo escuro
  features:
    - navigation.tracking
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/stylesheets/extra.css

extra:
  generator: false

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - footnotes
  - tables
  - attr_list
  - md_in_html

plugins:
  - search
  - redirects:
      redirect_maps:
        'analyses/pu-vegetal/resenha-melo-2023-compósito-eucalipto-pu.md': 'analyses/pu-vegetal/melo-2023-composto-reparo-madeira.md'
        'analyses/pu-vegetal/ficha-cazella-painel-pinus-pet.md': 'analyses/pu-vegetal/cazella-2022-paineis-pinus-pet-pu.md'
        'analyses/pu-vegetal/ficha-oliveira-painel-eucalipto-couro.md': 'analyses/pu-vegetal/oliveira-2019-paineis-eucalipto-couro-pu.md'
        'analyses/pu-vegetal/ficha-shara-lopes-bioinspirado.md': 'analyses/pu-vegetal/lopes-2020-composto-bagaco-cana.md'
        'analyses/pu-vegetal/ficha-bernardo-zandomenico-fibras.md': 'analyses/pu-vegetal/dias-2024-absorcao-fibras-compostos.md'
        'analyses/pu-vegetal/ficha-mariana-lopes-bambu-osb.md': 'analyses/pu-vegetal/lopes-2020-osb-residuos-bambu.md'
        'analyses/pu-vegetal/resenha-carvalho-2020-paineis-casca-mamona-pu.md': 'analyses/pu-vegetal/carvalho-2023-paineis-casca-mamona-pu.md'
        'analyses/bambu-estrutural/resenha-bio-oleo-termico-pimentel.md': 'analyses/bambu-estrutural/pimentel-tratamento-bi-oleo-bambu.md'
        'analyses/bambu-estrutural/resenha-lopes-2020-osb-residuos-bambu.md': 'analyses/pu-vegetal/lopes-2020-osb-residuos-bambu.md'
        'analyses/curso-design-permacultura-mollison.md': 'analyses/fundamentos/mollison-1981-curso-design-permacultura.md'
        'analyses/spaceship-earth-fuller.md': 'analyses/fundamentos/fuller-1969-manual-nave-espacial-terra.md'
        'sobre-o-autor/POL_neotropical-bamboo-review-2024.md': 'analyses/bambu-estrutural/neotropical-bamboo-review-2024.md'

exclude_docs: ""

