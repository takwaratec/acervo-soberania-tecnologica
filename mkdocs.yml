site_name: Análises e Escrita Científica
site_description: Repositório de análises de artigos, teses e dissertações — Estado da arte, fichas técnicas e revisões bibliográficas
site_url: https://takwaratec.github.io/acervo-soberania-tecnologica
repo_url: https://github.com/takwaratec/Analises-e-escrita-cientifica
repo_name: takwaratec/Analises-e-escrita-cientifica
edit_uri: edit/main/docs/
copyright: "© Fabio Takwara, 2026. CC BY 4.0. Grafismos: Lux Vidal (org.). Conteúdo das fichas e análises — uso livre mediante atribuição. Citações de terceiros mantêm seus direitos originais."

theme:
  name: material
  language: pt-BR
  logo: assets/logo/logo_mqtf_soberana.svg
  favicon: assets/logo/logo_mqtf_soberana.svg
  palette:
    - scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Modo claro
    - scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Modo escuro
  features:
    - navigation.tracking
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/stylesheets/extra.css

extra:
  generator: false

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - footnotes
  - tables
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - Início: index.md
  - Sobre: sobre.md
  - Metodologia: metodologia.md
  - Respaldo Acadêmico:
    - analyses/respaldo-academico/index.md
  - Fundamentação:
    - Montaigne: analyses/SOC_FIL_001_MONTAIGNE.md
    - Morin (7 Saberes): analyses/SOC_FIL_002_MORIN.md
    - Darcy Ribeiro: analyses/SOC_FIL_003_DARCY_RIBEIRO.md
    - Paulo Freire: analyses/SOC_FIL_004_PAULO_FREIRE.md
    - Milton Santos: analyses/SOC_SOC_001_MILTON_SANTOS.md
    - Florestan Fernandes: analyses/SOC_SOC_002_FLORESTAN_FERNANDES.md
    - Buckminster Fuller: analyses/SOC_DES_001_BUCKMINSTER_FULLER.md
    - Nave Espacial Terra: analyses/spaceship-earth-fuller.md
    - Sinergética — Cap. 1: analyses/synergetics-cap1-fuller.md
  - Permacultura:
    - Mollison: analyses/SOC_PER_001_MOLLISON.md
    - Holmgren: analyses/SOC_PER_002_HOLMGREN.md
    - Essência da Permacultura: analyses/essencia-da-permacultura-holmgren.md
    - Curso de Design em Permacultura: analyses/curso-design-permacultura-mollison.md
    - DIY Handbook (Trapese): analyses/diy-handbook-trapese.md
  - Bambu:
